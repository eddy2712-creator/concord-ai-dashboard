{% extends "base.html" %}

{% block title %}Add Client — Concord AI{% endblock %}

{% block content %}
<a href="/dashboard" class="text-indigo-600 hover:text-indigo-800 text-sm mb-4 inline-block">&larr; Back to Clients</a>

<h1 class="text-2xl font-bold text-gray-800 mb-6">Add New Client</h1>

<form method="POST" class="bg-white rounded-xl shadow p-6 max-w-lg">
    <div class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Client Name</label>
            <input type="text" name="name" required
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                   placeholder="E&E Ltd.">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Client Email</label>
            <input type="email" name="email" required
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                   placeholder="client@example.com">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Monthly Fee ($)</label>
            <input type="number" name="monthly_fee" step="0.01" value="0"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Included Minutes Per Month</label>
            <input type="number" name="threshold_minutes" value="0"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                   placeholder="e.g. 500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Overage Rate ($ per minute)</label>
            <input type="number" name="overage_rate" step="0.01" value="0.10"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>

        <hr class="border-gray-200">

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Twilio Phone Number</label>
            <input type="text" name="twilio_phone_number"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                   placeholder="+1234567890">
            <p class="text-xs text-gray-400 mt-1">The Twilio number assigned to this client. Used to track phone costs.</p>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Retell Agent ID</label>
            <input type="text" name="retell_agent_id"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                   placeholder="agent_abc123...">
            <p class="text-xs text-gray-400 mt-1">Find this in your Retell dashboard. You can add more agents later.</p>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Agent Label (optional)</label>
            <input type="text" name="agent_label"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                   placeholder="e.g. Main Line, After Hours">
        </div>

        <button type="submit"
                class="w-full bg-indigo-600 text-white py-2 px-4 rounded-lg hover:bg-indigo-700 font-medium">
            Add Client
        </button>
    </div>
</form>
{% endblock %}
